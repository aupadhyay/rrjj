name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - name: Build release benchmark target
        run: cargo build --release --locked -p rrjj
      - name: Run paired benchmark smoke
        env:
          RESULT_PATH: ${{ runner.temp }}/paired-smoke.json
        run: >-
          python3 bench/paired_runner.py
          --output "$RESULT_PATH"
          --quiescence-ms 20
          --max-delay-ms 100
          --settle-ms 50
          synthetic
          --mutations 8
          --working-set 4
          --file-bytes 16
          --burst-size 4
      - name: Validate paired benchmark semantics
        env:
          RESULT_PATH: ${{ runner.temp }}/paired-smoke.json
        run: >-
          python3 bench/validate_result.py "$RESULT_PATH"
          --expected-mutations 8
      - name: Run event-latency benchmark smoke
        env:
          RESULT_PATH: ${{ runner.temp }}/latency-smoke.json
        run: >-
          python3 bench/latency_runner.py
          --output "$RESULT_PATH"
          --iterations 1
          --quiescence-ms 20
          --max-delay-ms 100
          --timeout 15
          --burst-size 2
          --continuous-duration 0.25
          --continuous-interval-ms 20
      - name: Validate event-latency benchmark semantics
        env:
          RESULT_PATH: ${{ runner.temp }}/latency-smoke.json
        run: python3 bench/validate_latency_result.py "$RESULT_PATH"

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Validate Python syntax
        run: python -m py_compile bench/*.py bench/workloads/*.py
      - name: Test benchmark helpers
        run: python -m unittest discover -s bench -p "test_*.py"
      - name: Test timeline model
        run: node --test ui/scrubber/timeline-model.test.mjs

  database-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Start PostgreSQL and CockroachDB
        run: |
          docker run --rm -d --name rrjj-postgres \
            -e POSTGRES_PASSWORD=rrjj -p 5432:5432 postgres:16-alpine
          docker run --rm -d --name rrjj-cockroach \
            -p 26257:26257 cockroachdb/cockroach:v24.3.1 \
            start-single-node --insecure --listen-addr=0.0.0.0:26257
          for _ in {1..60}; do
            docker exec rrjj-postgres pg_isready -U postgres >/dev/null 2>&1 &&
              docker exec rrjj-cockroach cockroach sql --insecure \
                --host=127.0.0.1:26257 -e 'SELECT 1' >/dev/null 2>&1 &&
              exit 0
            sleep 1
          done
          exit 1
      - name: Test PostgreSQL schema modes
        env:
          RRJJ_TEST_DATABASE_URL: postgresql://postgres:rrjj@127.0.0.1:5432/postgres
        run: cargo test -p rrjj-sinks postgres_ --locked -- --test-threads=1
      - name: Test CockroachDB schema modes
        env:
          RRJJ_TEST_DATABASE_URL: postgresql://root@127.0.0.1:26257/defaultdb?sslmode=disable
        run: cargo test -p rrjj-sinks postgres_ --locked -- --test-threads=1
      - name: Stop databases
        if: always()
        run: docker stop rrjj-postgres rrjj-cockroach || true

# CI only runs tiny correctness smokes. The 1M synthetic, product-default
# latency, and Modal runs are explicit manual benchmarks documented in
# bench/README.md.
