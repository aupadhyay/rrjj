name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  linux-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.96.0
          targets: x86_64-unknown-linux-musl
          components: rustfmt, clippy
      - name: Install musl compiler
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Verify tag matches package version
        run: |
          version="${GITHUB_REF_NAME#v}"
          package_version="$(cargo metadata --no-deps --format-version 1 |
            jq -r '.packages[] | select(.name == "rrjj") | .version')"
          test "${version}" = "${package_version}"
      - name: Validate source
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked
      - name: Build static release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl -p rrjj
      - name: Verify static release binary
        run: |
          binary=target/x86_64-unknown-linux-musl/release/rrjj
          "$binary" --version
          if readelf -l "$binary" | grep -q "Requesting program interpreter"; then
            echo "binary is dynamically linked" >&2
            exit 1
          fi
      - name: Package release
        env:
          TARGET: x86_64-unknown-linux-musl
        run: |
          set -euxo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="rrjj-${version}-${TARGET}"
          mkdir -p "dist/${archive}/schema"
          cp "target/${TARGET}/release/rrjj" README.md CHANGELOG.md LICENSE "dist/${archive}/"
          cp schema/v0.md "dist/${archive}/schema/"
          tar -C dist -czf "dist/${archive}.tar.gz" "${archive}"
          rm -rf "dist/${archive}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rrjj-linux-musl
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs: linux-musl
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: cd dist && sha256sum *.tar.gz > SHA256SUMS
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
