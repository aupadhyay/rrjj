name: musl

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.96.0
          targets: x86_64-unknown-linux-musl
      - name: Install musl compiler
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build static binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl -p rrjj
      - name: Verify static binary
        run: |
          binary=target/x86_64-unknown-linux-musl/release/rrjj
          "$binary" --version
          if readelf -l "$binary" | grep -q "Requesting program interpreter"; then
            echo "binary is dynamically linked" >&2
            exit 1
          fi
